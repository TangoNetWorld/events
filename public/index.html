<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TangoNet World — Global Tango Events</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<script>window.CESIUM_BASE_URL = 'https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/';</script>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c9a84c;--gold-dim:rgba(201,168,76,0.3);--dark:#060a12;--panel:#0b1220ee;--text:#e2d9c8;--muted:#7a7060;--r:6px}
html,body{width:100%;height:100%;background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}

#cesiumContainer{position:fixed;inset:0;width:100%;height:100%}
.cesium-widget-credits,
.cesium-credit-logoContainer,
.cesium-credit-textContainer,
.cesium-viewer-toolbar,
.cesium-viewer-animationContainer,
.cesium-viewer-timelineContainer,
.cesium-viewer-bottom,
.cesium-infoBox,
.cesium-selection-wrapper{display:none!important}

#hd{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;padding:22px 28px 60px;background:linear-gradient(to bottom,rgba(6,10,18,.95) 0%,transparent 100%)}
#hd h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(1.4rem,4vw,2.1rem);letter-spacing:.06em;line-height:1}
#hd h1 em{color:var(--gold);font-style:italic}
#hd p{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:5px}

#panel{position:fixed;top:50%;right:20px;transform:translateY(-50%) translateX(calc(100% + 24px));width:min(300px,calc(100vw - 40px));background:var(--panel);border:1px solid var(--gold-dim);border-radius:var(--r);padding:24px;z-index:20;transition:transform .45s cubic-bezier(.23,1,.32,1);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
#panel.on{transform:translateY(-50%) translateX(0)}
#pcls{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;transition:color .2s;line-height:1;font-family:'DM Sans',sans-serif}
#pcls:hover{color:var(--gold)}
.ptag{font-size:.58rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ptag::after{content:'';flex:1;height:1px;background:var(--gold-dim)}
#pname{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:300;line-height:1.3;margin-bottom:18px}
.prow{display:flex;gap:10px;margin-bottom:11px;font-size:.75rem;color:var(--muted);line-height:1.5}
.prow .ic{color:var(--gold);width:13px;flex-shrink:0;margin-top:2px}
.prow strong{color:var(--text);font-weight:400;display:block}
#plink{display:block;margin-top:20px;padding:10px 0;border:1px solid var(--gold-dim);border-radius:var(--r);text-align:center;text-decoration:none;color:var(--gold);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;transition:all .25s}
#plink:hover{background:var(--gold);color:var(--dark)}

#clist{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.96);width:min(360px,calc(100vw - 32px));max-height:70vh;background:var(--panel);border:1px solid var(--gold-dim);border-radius:var(--r);padding:0;z-index:25;opacity:0;pointer-events:none;transition:all .35s cubic-bezier(.23,1,.32,1);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);overflow:hidden;display:flex;flex-direction:column}
#clist.on{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
#clist-hd{padding:16px 20px;border-bottom:1px solid var(--gold-dim);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#clist-hd h3{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.1rem}
#clist-cls{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;font-family:'DM Sans',sans-serif}
#clist-cls:hover{color:var(--gold)}
#clist-body{overflow-y:auto;flex:1}
#clist-body::-webkit-scrollbar{width:3px}
#clist-body::-webkit-scrollbar-thumb{background:var(--gold-dim)}
.citem{padding:14px 20px;border-bottom:1px solid rgba(201,168,76,.08);cursor:pointer;transition:background .15s}
.citem:hover{background:rgba(201,168,76,.07)}
.citem:last-child{border-bottom:none}
.citem-name{font-size:.82rem;color:var(--text);margin-bottom:3px;line-height:1.35}
.citem-meta{font-size:.68rem;color:var(--muted)}

#tip{position:fixed;pointer-events:none;z-index:30;background:rgba(6,10,18,.96);border:1px solid var(--gold-dim);border-radius:var(--r);padding:7px 12px;font-size:.7rem;color:var(--text);letter-spacing:.03em;white-space:nowrap;transform:translate(-50%,-130%);opacity:0;transition:opacity .15s}
#tip.on{opacity:1}

#search-wrap{position:fixed;top:20px;right:20px;z-index:15;display:flex;align-items:center;gap:6px}
#search{background:rgba(11,18,32,.9);border:1px solid var(--gold-dim);border-radius:var(--r);padding:8px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.75rem;width:0;opacity:0;outline:none;transition:width .3s,opacity .3s}
#search.open{width:200px;opacity:1}
#search-btn{background:rgba(11,18,32,.9);border:1px solid var(--gold-dim);border-radius:var(--r);padding:8px 12px;color:var(--gold);cursor:pointer;font-size:.9rem;transition:background .2s}
#search-btn:hover{background:rgba(201,168,76,.15)}

#lang-btn {
  background: rgba(11, 18, 32, .9);
  border: 1px solid var(--gold-dim);
  border-radius: var(--r);
  padding: 8px 12px;
  color: var(--muted);
  cursor: pointer;
  font-size: .6rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  font-family: 'DM Sans', sans-serif;
  transition: all .2s;
  display: flex;
  align-items: center;
  gap: 5px;
}
#lang-btn:hover { border-color: var(--gold); }

#lang-btn span {
  opacity: 0.4;
  transition: opacity 0.2s, color 0.2s;
}

#lang-btn span.lactive {
  opacity: 1;
  color: var(--gold);
  font-weight: bold;
}
#lang-btn .lsep { opacity: .3; }

#stats{position:fixed;bottom:44px;left:28px;z-index:10;pointer-events:none;display:flex;gap:20px}
.stat{text-align:center}
.stat .n{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--gold);font-weight:300}
.stat .l{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}

#loading{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .8s}
#loading.fade{opacity:0;pointer-events:none}
.ring{width:52px;height:52px;border-radius:50%;border:1px solid rgba(201,168,76,.15);border-top-color:var(--gold);animation:spin 1.1s linear infinite;margin-bottom:18px}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted)}

@media(max-width:600px){
  #panel{right:10px;width:calc(100vw - 20px)}
  #stats{display:none}
  #search-wrap{top:14px;right:14px}
  #lang-btn{top:14px;left:14px}
  #search.open{width:160px}
}
</style>
</head>
<body>

<div id="loading"><div class="ring"></div><p id="loading-text">Yükleniyor…</p></div>
<div id="cesiumContainer"></div>

<div id="hd">
  <h1>TangoNet <em>World</em></h1>
</div>

<div id="search-wrap">
	<button id="lang-btn">
	  <span id="l-tr" class="lactive">TR</span>
	  <span class="lsep">|</span>
	  <span id="l-en">EN</span>
	</button>
  <input id="search" type="text" autocomplete="off">
  <button id="search-btn" title="Ara">⌕</button>
</div>

<div id="panel">
  <button id="pcls">✕</button>
  <div class="ptag" id="ptag-label">Etkinlik</div>
  <div id="pname">—</div>
  <div class="prow"><span class="ic">📍</span><div><strong id="pcity">—</strong><span id="pcountry"></span></div></div>
  <div class="prow"><span class="ic">📅</span><div id="pdate">—</div></div>
  <a id="plink" href="#" target="_blank" rel="noopener">Etkinliğe Git →</a>
</div>

<div id="clist">
  <div id="clist-hd">
    <h3 id="clist-title">Etkinlikler</h3>
    <button id="clist-cls">✕</button>
  </div>
  <div id="clist-body"></div>
</div>

<div id="tip"></div>

<div id="stats">
  <div class="stat"><div class="n" id="s-total">0</div><div class="l" id="stat-events">Etkinlik</div></div>
  <div class="stat"><div class="n" id="s-country">0</div><div class="l" id="stat-countries">Ülke</div></div>
</div>

<script>
'use strict';

const STRINGS = {
  tr: {
    loading:        'Yükleniyor…',
    loadingEvents:  '— etkinlik yükleniyor',
    eventsCount:    (n, c) => `${n} etkinlik · ${c} ülke`,
    event:          'Etkinlik',
    goToEvent:      'Etkinliğe Git →',
    events:         'Etkinlik',
    countries:      'Ülke',
    searchTitle:    'Ara',
    searchPlaceholder: 'Şehir veya etkinlik ara…',
    clusterSuffix:  n => `${n} etkinlik`,
    clusterTitle:   (place, n) => `${place} — ${n} etkinlik`,
    tipCluster:     n => `${n} etkinlik`,
    error:          e => `Hata: ${e}`,
    locale:         'tr-TR',
  },
  en: {
    loading:        'Loading…',
    loadingEvents:  '— loading events',
    eventsCount:    (n, c) => `${n} events · ${c} countries`,
    event:          'Event',
    goToEvent:      'Go to Event →',
    events:         'Events',
    countries:      'Countries',
    searchTitle:    'Search',
    searchPlaceholder: 'Search city or event…',
    clusterSuffix:  n => `${n} events`,
    clusterTitle:   (place, n) => `${place} — ${n} events`,
    tipCluster:     n => `${n} events`,
    error:          e => `Error: ${e}`,
    locale:         'en-GB',
  }
};

let lang = 'tr';

function t(key, ...args) {
  const val = STRINGS[lang][key];
  return typeof val === 'function' ? val(...args) : val;
}

function applyLang() {
  document.documentElement.lang = lang;
  
  const loadingTextEl = document.getElementById('loading-text');
  if (loadingTextEl) {
    loadingTextEl.textContent = t('loading');
  }
  
  
  document.getElementById('ptag-label').textContent     = t('event');
  document.getElementById('plink').textContent          = t('goToEvent');
  document.getElementById('stat-events').textContent    = t('events');
  document.getElementById('stat-countries').textContent = t('countries');
  document.getElementById('search-btn').title           = t('searchTitle');
  document.getElementById('search').placeholder         = t('searchPlaceholder');
  document.getElementById('l-tr').className = lang === 'tr' ? 'lactive' : '';
  document.getElementById('l-en').className = lang === 'en' ? 'lactive' : '';

  if (panel.classList.contains('on') && _currentEvent) {
    document.getElementById('pdate').textContent = fmtDate(_currentEvent.startDate, _currentEvent.endDate);
  }
  if (clist.classList.contains('on') && _currentCluster) {
  const sorted = [..._currentCluster.events].sort(
    (a, b) => new Date(a.startDate || 0) - new Date(b.startDate || 0)
  );
  const place = sorted[0].city || sorted[0].country;
  document.getElementById('clist-title').textContent = t('clusterTitle', place, sorted.length);
  renderClusterBody(sorted);
  }
}

document.getElementById('lang-btn').addEventListener('click', () => {
  lang = lang === 'tr' ? 'en' : 'tr';
  applyLang();
});

const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

const DATA_URL = './events.json';
const DEMO_EVENTS = [
  {eventName:"Tango Summer Festival Heidelberg",startDate:"2026-09-07",endDate:"2026-09-13",city:"Heidelberg",country:"Germany",latitude:49.41,longitude:8.69,eventUrl:"#"},

  {eventName:"Paris Tango Marathon",startDate:"2026-07-14",endDate:"2026-07-17",city:"Paris",country:"France",latitude:48.86,longitude:2.35,eventUrl:"#"},

  {eventName:"New York Tango Week",startDate:"2026-06-15",endDate:"2026-06-21",city:"New York",country:"USA",latitude:40.71,longitude:-74.01,eventUrl:"#"},
  {eventName:"Rome Tango Encuentro",startDate:"2026-09-20",endDate:"2026-09-24",city:"Rome",country:"Italy",latitude:41.90,longitude:12.50,eventUrl:"#"},
  {eventName:"Montevideo Tango Encuentro",startDate:"2026-08-28",endDate:"2026-09-01",city:"Montevideo",country:"Uruguay",latitude:-34.90,longitude:-56.16,eventUrl:"#"},
  {eventName:"Amsterdam Tango Salon",startDate:"2026-07-04",endDate:"2026-07-07",city:"Amsterdam",country:"Netherlands",latitude:52.37,longitude:4.90,eventUrl:"#"},
  {eventName:"Prague Tango Marathon",startDate:"2026-10-23",endDate:"2026-10-26",city:"Prague",country:"Czech Republic",latitude:50.08,longitude:14.44,eventUrl:"#"},
  {eventName:"Sydney Tango Festival",startDate:"2026-05-01",endDate:"2026-05-05",city:"Sydney",country:"Australia",latitude:-33.87,longitude:151.21,eventUrl:"#"},
  {eventName:"Barcelona Tango Encuentro",startDate:"2026-06-01",endDate:"2026-06-05",city:"Barcelona",country:"Spain",latitude:41.39,longitude:2.17,eventUrl:"#"},

  {eventName:"Athens Tango Festival",startDate:"2026-09-15",endDate:"2026-09-19",city:"Athens",country:"Greece",latitude:37.98,longitude:23.73,eventUrl:"#"},
  {eventName:"Kiev Tango Marathon",startDate:"2026-06-20",endDate:"2026-06-23",city:"Kiev",country:"Ukraine",latitude:50.45,longitude:30.52,eventUrl:"#"},
  {eventName:"Moscow Tango Festival",startDate:"2026-10-15",endDate:"2026-10-19",city:"Moscow",country:"Russia",latitude:55.75,longitude:37.62,eventUrl:"#"},

const naturalEarthBase = Cesium.ImageryLayer.fromProviderAsync(
  Cesium.TileMapServiceImageryProvider.fromUrl(
    Cesium.buildModuleUrl('Assets/Textures/NaturalEarthII')
  )
);

const viewer = new Cesium.Viewer('cesiumContainer', {
  baseLayer:              naturalEarthBase,
  terrainProvider:        new Cesium.EllipsoidTerrainProvider(),
  baseLayerPicker:        false,
  geocoder:               false,
  homeButton:             false,
  sceneModePicker:        false,
  navigationHelpButton:   false,
  animation:              false,
  timeline:               false,
  fullscreenButton:       false,
  vrButton:               false,
  infoBox:                false,
  selectionIndicator:     false,
  shouldAnimate:          false,
});

Cesium.ArcGisMapServerImageryProvider.fromUrl(
  'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
).then(provider => {
  viewer.imageryLayers.addImageryProvider(provider);
}).catch(() => {});

viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#060a12');
viewer.scene.globe.enableLighting = false;

if (isMobile) {
  viewer.scene.globe.showGroundAtmosphere = false;
  try { viewer.scene.skyAtmosphere.show = false; } catch(_) {}
} else {
  viewer.scene.globe.showGroundAtmosphere = true;
  try {
    const atm = viewer.scene.skyAtmosphere;
    atm.show            = true;
    atm.hueShift        = -0.04;
    atm.saturationShift =  0.12;
    atm.brightnessShift = -0.12;
  } catch(_) {}
}

const camCtrl = viewer.scene.screenSpaceCameraController;
camCtrl.minimumZoomDistance =    5000;
camCtrl.maximumZoomDistance = 35000000;

function makeSingleCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const S   = 64 * dpr;
  const cv  = document.createElement('canvas');
  cv.width  = S; cv.height = S;
  const x   = cv.getContext('2d');
  const c   = S / 2;
  x.shadowColor = 'rgba(0,0,0,0.65)'; x.shadowBlur = 8 * dpr;
  x.fillStyle = 'rgba(11,18,32,0.93)';
  x.beginPath(); x.arc(c, c, 14 * dpr, 0, Math.PI * 2); x.fill();
  x.shadowBlur = 0; x.strokeStyle = 'rgba(201,168,76,0.9)'; x.lineWidth = 2 * dpr;
  x.beginPath(); x.arc(c, c, 14 * dpr, 0, Math.PI * 2); x.stroke();
  x.fillStyle = '#c9a84c';
  x.beginPath(); x.arc(c, c, 5 * dpr, 0, Math.PI * 2); x.fill();
  return cv;
}

const _clusterCache = {};
function makeClusterCanvas(n) {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const label = n > 99 ? '99+' : String(n);
  const S = 128 * dpr;
  const cv = document.createElement('canvas');
  cv.width = S; cv.height = S;
  const x = cv.getContext('2d');
  const c = S / 2; const r = 46 * dpr;
  x.shadowColor = 'rgba(0,0,0,0.7)'; x.shadowBlur = 14 * dpr; x.shadowOffsetY = 2 * dpr;
  x.fillStyle = 'rgba(11,18,32,0.95)';
  x.beginPath(); x.arc(c, c, r, 0, Math.PI * 2); x.fill();
  x.shadowBlur = 0; x.shadowOffsetY = 0;
  x.strokeStyle = 'rgba(201,168,76,0.9)'; x.lineWidth = 4 * dpr;
  x.beginPath(); x.arc(c, c, r, 0, Math.PI * 2); x.stroke();
  const fs = (label.length > 2 ? 32 : 36) * dpr;
  x.fillStyle = '#e2d9c8'; x.font = `600 ${fs}px 'DM Sans', sans-serif`;
  x.textAlign = 'center'; x.textBaseline = 'middle';
  x.fillText(label, c, c + dpr);
  return cv;
}

const SINGLE_CANVAS = makeSingleCanvas();
function getClusterCanvas(n) {
  if (!_clusterCache[n]) _clusterCache[n] = makeClusterCanvas(n);
  return _clusterCache[n];
}

function heightToGridDeg(h) {
  if (h > 18000000) return 14; if (h > 12000000) return 10;
  if (h >  7000000) return 7;  if (h >  4000000) return 4;
  if (h >  2000000) return 2.5;if (h >  1000000) return 1.5;
  if (h >   500000) return 0.8;if (h >   200000) return 0.4;
  if (h >    80000) return 0.15; return 0.05;
}

function buildClusters(events, gridDeg) {
  const map = {};
  events.forEach(ev => {
    const key = `${Math.round(ev.latitude / gridDeg)}:${Math.round(ev.longitude / gridDeg)}`;
    (map[key] = map[key] || []).push(ev);
  });
  return Object.values(map).map(arr => ({
    events: arr,
    lat:    arr.reduce((s, e) => s + e.latitude,  0) / arr.length,
    lon:    arr.reduce((s, e) => s + e.longitude, 0) / arr.length,
    count:  arr.length,
  }));
}

const billboards = viewer.scene.primitives.add(
  new Cesium.BillboardCollection({ scene: viewer.scene })
);

let EVENTS         = [];
let lastGridDeg    = -1;
let searchQuery    = '';
let cachedClusters = null;
let _currentEvent  = null;

let _clustersSnapshot = null;
let lastClickHandled  = 0;
let longPressTimer    = null;
let longPressHandled  = false;
let longPressOrigin   = null;
const LONG_PRESS_MS   = 1000;
const LONG_PRESS_PX   = 12;

function getCamHeight() {
  try { return viewer.camera.positionCartographic.height; }
  catch (_) { return 15000000; }
}

function refreshMarkers(height, force) {
  const gd = heightToGridDeg(height);
  if (gd !== lastGridDeg || force || !cachedClusters) {
    lastGridDeg    = gd;
    cachedClusters = buildClusters(EVENTS, gd);
  }
  billboards.removeAll();
  cachedClusters.forEach(cl => {
    if (!isVisibleFromCamera(cl.lat, cl.lon)) return;
    const isSingle = cl.count === 1;
    const canvas   = isSingle ? SINGLE_CANVAS : getClusterCanvas(cl.count);
    const size     = isSingle ? 26 : 44;
    const matches  = !searchQuery || cl.events.some(ev =>
      ev.city.toLowerCase().includes(searchQuery)    ||
      ev.country.toLowerCase().includes(searchQuery) ||
      ev.eventName.toLowerCase().includes(searchQuery)
    );
    const b = billboards.add({
      position:                 Cesium.Cartesian3.fromDegrees(cl.lon, cl.lat, 800),
      width:                    size,
      height:                   size,
      verticalOrigin:           Cesium.VerticalOrigin.CENTER,
      horizontalOrigin:         Cesium.HorizontalOrigin.CENTER,
      disableDepthTestDistance: Number.POSITIVE_INFINITY,
      id:                       cl,
      color: matches ? Cesium.Color.WHITE : new Cesium.Color(1, 1, 1, 0.07),
    });
    const imageId = isSingle ? 'marker-single' : `marker-cluster-${cl.count}`;
    b.setImage(imageId, canvas);
  });
}

function isVisibleFromCamera(lat, lon) {
  const cam    = viewer.camera.positionWC;
  const camDir = Cesium.Cartesian3.normalize(cam, new Cesium.Cartesian3());
  const pos    = Cesium.Cartesian3.fromDegrees(lon, lat);
  const globeDir = Cesium.Cartesian3.normalize(pos, new Cesium.Cartesian3());
  return Cesium.Cartesian3.dot(camDir, globeDir) > 0;
}

viewer.camera.percentageChanged = isMobile ? 0.05 : 0.015;
let _rebuildTimer = null;
viewer.camera.changed.addEventListener(() => {
  if (!EVENTS.length) return;
  clearTimeout(_rebuildTimer);
  _rebuildTimer = setTimeout(() => refreshMarkers(getCamHeight()), 150);
});

const panel = document.getElementById('panel');
const clist = document.getElementById('clist');
const tipEl = document.getElementById('tip');

function fmtDate(s, e) {
  const locale = t('locale');
  const fmt = d => new Date(d).toLocaleDateString(locale,
    { day: 'numeric', month: 'short', year: 'numeric' });
  return fmt(s) + ' — ' + fmt(e);
}

function showPanel(ev) {
  _currentEvent = ev;
  document.getElementById('pname').textContent    = ev.eventName;
  document.getElementById('pcity').textContent    = ev.city + ', ';
  document.getElementById('pcountry').textContent = ev.country;
  document.getElementById('pdate').textContent    = fmtDate(ev.startDate, ev.endDate);
  document.getElementById('plink').textContent    = t('goToEvent');
  const lnk    = document.getElementById('plink');
  const noLink = !ev.eventUrl || ev.eventUrl === '#';
  lnk.href                = ev.eventUrl || '#';
  lnk.style.opacity       = noLink ? '.4' : '1';
  lnk.style.pointerEvents = noLink ? 'none' : 'auto';
  panel.classList.add('on');
  clist.classList.remove('on');
}

let _currentCluster = null;
function showCluster(cl) {
  if (cl.count === 1) { showPanel(cl.events[0]); return; }
  _currentCluster = cl;
  const sorted = [...cl.events].sort(
    (a, b) => new Date(a.startDate || 0) - new Date(b.startDate || 0)
  );
  const place = sorted[0].city || sorted[0].country;
  document.getElementById('clist-title').textContent = t('clusterTitle', place, sorted.length);
  renderClusterBody(sorted);
  clist.classList.add('on');
  panel.classList.remove('on');
  if (isMobile) {
    clist.style.pointerEvents = 'none';
    setTimeout(() => { clist.style.pointerEvents = ''; }, 400);
  }
}

function renderClusterBody(sorted) {
  const body = document.getElementById('clist-body');
  const locale = t('locale');
  body.innerHTML = sorted.map((ev, i) =>
    `<div class="citem" data-i="${i}">
      <div class="citem-name">${ev.eventName}</div>
      <div class="citem-meta">${ev.city}, ${ev.country} · ${
        ev.startDate
          ? new Date(ev.startDate).toLocaleDateString(locale,
              { day: 'numeric', month: 'short', year: 'numeric' })
          : '—'
      }</div>
    </div>`
  ).join('');
  body.querySelectorAll('.citem').forEach(el =>
    el.addEventListener('click', () => showPanel(sorted[+el.dataset.i]))
  );
}

document.getElementById('pcls').addEventListener('click',     () => panel.classList.remove('on'));
document.getElementById('clist-cls').addEventListener('click', () => clist.classList.remove('on'));

function showTip(text, x, y) {
  tipEl.textContent = text;
  tipEl.style.left  = x + 'px';
  tipEl.style.top   = y + 'px';
  tipEl.classList.add('on');
}
function hideTip() { tipEl.classList.remove('on'); }

const evHandler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

viewer.scene.canvas.addEventListener('touchstart', (e) => {
  _clustersSnapshot = cachedClusters ? cachedClusters.slice() : null;
  longPressHandled  = false;
  const t    = e.touches[0];
  const rect = viewer.scene.canvas.getBoundingClientRect();
  longPressOrigin = { x: t.clientX - rect.left, y: t.clientY - rect.top };
  clearTimeout(longPressTimer);
  longPressTimer = setTimeout(() => {
    const clusters = _clustersSnapshot || cachedClusters;
    if (!clusters || !longPressOrigin) return;
    let best = null, bestDist = 60;
    clusters.forEach(cl => {
      if (!isVisibleFromCamera(cl.lat, cl.lon)) return;
      const wp = Cesium.Cartesian3.fromDegrees(cl.lon, cl.lat, 800);
      const sc = Cesium.SceneTransforms.wgs84ToWindowCoordinates(viewer.scene, wp);
      if (!Cesium.defined(sc)) return;
      const d = Math.hypot(sc.x - longPressOrigin.x, sc.y - longPressOrigin.y);
      if (d < bestDist) { bestDist = d; best = cl; }
    });
    if (best) { longPressHandled = true; showCluster(best); }
  }, LONG_PRESS_MS);
}, { passive: true });

viewer.scene.canvas.addEventListener('touchmove', (e) => {
  if (!longPressOrigin || !longPressTimer) return;
  const touch = e.touches[0];
  const rect  = viewer.scene.canvas.getBoundingClientRect();
  const dx = (touch.clientX - rect.left) - longPressOrigin.x;
  const dy = (touch.clientY - rect.top)  - longPressOrigin.y;
  if (Math.hypot(dx, dy) > LONG_PRESS_PX) { clearTimeout(longPressTimer); longPressTimer = null; }
}, { passive: true });

viewer.scene.canvas.addEventListener('touchend', () => {
  clearTimeout(longPressTimer);
  longPressTimer  = null;
  longPressOrigin = null;
}, { passive: true });

evHandler.setInputAction(mv => {
  const now = Date.now();
  if (now - lastClickHandled < 350) return;
  if (longPressHandled) { longPressHandled = false; return; }
  lastClickHandled = now;
  let clusterData = null;
  if (isMobile) {
    const clusters = _clustersSnapshot || cachedClusters;
    if (clusters) {
      let best = null, bestDist = 48;
      clusters.forEach(cl => {
        if (!isVisibleFromCamera(cl.lat, cl.lon)) return;
        const wp = Cesium.Cartesian3.fromDegrees(cl.lon, cl.lat, 800);
        const sc = Cesium.SceneTransforms.wgs84ToWindowCoordinates(viewer.scene, wp);
        if (!Cesium.defined(sc)) return;
        const d = Math.hypot(sc.x - mv.position.x, sc.y - mv.position.y);
        if (d < bestDist) { bestDist = d; best = cl; }
      });
      clusterData = best;
    }
  } else {
    const hit = viewer.scene.pick(mv.position);
    if (Cesium.defined(hit) && hit.id && hit.id.events) clusterData = hit.id;
  }
  if (clusterData) { showCluster(clusterData); }
  else { panel.classList.remove('on'); clist.classList.remove('on'); }
}, Cesium.ScreenSpaceEventType.LEFT_CLICK);

evHandler.setInputAction(mv => {
  const hit = viewer.scene.pick(mv.endPosition);
  if (Cesium.defined(hit) && Cesium.defined(hit.id) && hit.id.events) {
    const cl   = hit.id;
    const text = cl.count === 1
      ? `${cl.events[0].city}, ${cl.events[0].country}`
      : t('tipCluster', cl.count);
    showTip(text, mv.endPosition.x, mv.endPosition.y);
    viewer.scene.canvas.style.cursor = 'pointer';
  } else {
    hideTip();
    viewer.scene.canvas.style.cursor = '';
  }
}, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

evHandler.setInputAction(() => hideTip(), Cesium.ScreenSpaceEventType.LEFT_DOWN);

const searchEl  = document.getElementById('search');
const searchBtn = document.getElementById('search-btn');
let   searchOpen = false;

searchBtn.addEventListener('click', () => {
  searchOpen = !searchOpen;
  searchEl.classList.toggle('open', searchOpen);
  if (searchOpen) searchEl.focus();
  else { searchEl.value = ''; applySearch(''); }
});
searchEl.addEventListener('input', e => applySearch(e.target.value.trim().toLowerCase()));
searchEl.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    searchOpen = false;
    searchEl.classList.remove('open');
    searchEl.value = '';
    applySearch('');
  }
});

function applySearch(q) {
  searchQuery = q;
  refreshMarkers(getCamHeight(), true);
  if (q.length < 2) return;
  const gd    = heightToGridDeg(getCamHeight());
  const first = buildClusters(EVENTS, gd).find(cl => cl.events.some(ev =>
    ev.city.toLowerCase().includes(q)    ||
    ev.country.toLowerCase().includes(q) ||
    ev.eventName.toLowerCase().includes(q)
  ));
  if (first) {
    viewer.camera.flyTo({
      destination:    Cesium.Cartesian3.fromDegrees(first.lon, first.lat, 3500000),
      orientation:    { heading: 0, pitch: -Cesium.Math.PI_OVER_TWO, roll: 0 },
      duration:       1.6,
      easingFunction: Cesium.EasingFunction.CUBIC_OUT,
    });
  }
}

async function loadData() {
  try {
    const res  = await fetch(DATA_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    EVENTS = Array.isArray(json) && json.length ? json : DEMO_EVENTS;
  } catch (_) {
    EVENTS = DEMO_EVENTS;
  }
  const countries = new Set(EVENTS.map(e => e.country));
  document.getElementById('s-total').textContent   = EVENTS.length;
  document.getElementById('s-country').textContent = countries.size;
  refreshMarkers(getCamHeight(), true);
}

applyLang();

viewer.camera.setView({
  destination: Cesium.Cartesian3.fromDegrees(20, 18, 24000000),
  orientation: { heading: 0, pitch: -Cesium.Math.PI_OVER_TWO, roll: 0 },
});

loadData()
  .then(() => {
    viewer.camera.flyTo({
      destination:    Cesium.Cartesian3.fromDegrees(20, 18, 14500000),
      orientation:    { heading: 0, pitch: -Cesium.Math.PI_OVER_TWO, roll: 0 },
      duration:       2.8,
      easingFunction: Cesium.EasingFunction.CUBIC_OUT,
      complete() {
        const ld = document.getElementById('loading');
        ld.classList.add('fade');
        setTimeout(() => ld.remove(), 900);
      },
    });
  })
  .catch(err => {
    const p = document.querySelector('#loading p');
    if (p) p.textContent = t('error', err && err.message ? err.message : err);
  });
</script>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tango World — Global Events Globe</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --gold:#c9a84c;--gold-light:#e8c97a;--gold-dim:rgba(201,168,76,0.3);
  --dark:#060a12;--panel:#0b1220ee;--text:#e2d9c8;--muted:#7a7060;
  --radius:6px;
}

html,body{width:100%;height:100%;background:var(--dark);color:var(--text);
  font-family:'DM Sans',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}

#c{position:fixed;inset:0;cursor:grab}
#c:active{cursor:grabbing}
canvas{display:block}

/* ── HEADER ── */
#hd{
  position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;
  padding:22px 28px 60px;
  background:linear-gradient(to bottom,rgba(6,10,18,.95) 0%,transparent 100%);
}
#hd h1{
  font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(1.4rem,4vw,2.1rem);
  letter-spacing:.06em;line-height:1;
}
#hd h1 em{color:var(--gold);font-style:italic}
#hd p{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:5px}

/* ── PANEL ── */
#panel{
  position:fixed;top:50%;right:20px;
  transform:translateY(-50%) translateX(calc(100% + 24px));
  width:min(300px,calc(100vw - 40px));
  background:var(--panel);
  border:1px solid var(--gold-dim);
  border-radius:var(--radius);
  padding:24px;z-index:20;
  transition:transform .45s cubic-bezier(.23,1,.32,1);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
}
#panel.on{transform:translateY(-50%) translateX(0)}
#pcls{
  position:absolute;top:12px;right:14px;
  background:none;border:none;color:var(--muted);
  font-size:1rem;cursor:pointer;transition:color .2s;line-height:1;
  font-family:'DM Sans',sans-serif;
}
#pcls:hover{color:var(--gold)}
.ptag{
  font-size:.58rem;letter-spacing:.25em;text-transform:uppercase;
  color:var(--gold);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.ptag::after{content:'';flex:1;height:1px;background:var(--gold-dim)}
#pname{
  font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:300;
  line-height:1.3;margin-bottom:18px
}
.prow{display:flex;gap:10px;margin-bottom:11px;font-size:.75rem;color:var(--muted);line-height:1.5}
.prow .ic{color:var(--gold);width:13px;flex-shrink:0;margin-top:2px}
.prow strong{color:var(--text);font-weight:400;display:block}
#plink{
  display:block;margin-top:20px;padding:10px 0;
  border:1px solid var(--gold-dim);border-radius:var(--radius);
  text-align:center;text-decoration:none;color:var(--gold);
  font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;
  transition:all .25s;
}
#plink:hover{background:var(--gold);color:var(--dark)}

/* ── CLUSTER LIST ── */
#clist{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.96);
  width:min(360px,calc(100vw - 32px));max-height:70vh;
  background:var(--panel);border:1px solid var(--gold-dim);
  border-radius:var(--radius);padding:0;z-index:25;
  opacity:0;pointer-events:none;
  transition:all .35s cubic-bezier(.23,1,.32,1);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  overflow:hidden;display:flex;flex-direction:column;
}
#clist.on{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
#clist-hd{
  padding:16px 20px;border-bottom:1px solid var(--gold-dim);
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
}
#clist-hd h3{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.1rem}
#clist-cls{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;font-family:'DM Sans',sans-serif}
#clist-cls:hover{color:var(--gold)}
#clist-body{overflow-y:auto;flex:1}
#clist-body::-webkit-scrollbar{width:3px}
#clist-body::-webkit-scrollbar-track{background:transparent}
#clist-body::-webkit-scrollbar-thumb{background:var(--gold-dim)}
.citem{
  padding:14px 20px;border-bottom:1px solid rgba(201,168,76,.08);
  cursor:pointer;transition:background .15s;
}
.citem:hover{background:rgba(201,168,76,.07)}
.citem:last-child{border-bottom:none}
.citem-name{font-size:.82rem;color:var(--text);margin-bottom:3px;line-height:1.35}
.citem-meta{font-size:.68rem;color:var(--muted)}

/* ── TOOLTIP ── */
#tip{
  position:fixed;pointer-events:none;z-index:30;
  background:rgba(6,10,18,.96);border:1px solid var(--gold-dim);
  border-radius:var(--radius);padding:7px 12px;
  font-size:.7rem;color:var(--text);letter-spacing:.03em;
  white-space:nowrap;transform:translate(-50%,-130%);
  opacity:0;transition:opacity .15s;
}
#tip.on{opacity:1}

/* ── FOOTER ── */
#ft{
  position:fixed;bottom:0;left:0;right:0;z-index:10;pointer-events:none;
  padding:50px 28px 18px;
  background:linear-gradient(to top,rgba(6,10,18,.85) 0%,transparent 100%);
  display:flex;justify-content:space-between;align-items:flex-end;
}
#ft p{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}

/* ── SEARCH ── */
#search-wrap{
  position:fixed;top:20px;right:20px;z-index:15;
  display:flex;align-items:center;gap:0;
}
#search{
  background:rgba(11,18,32,.9);border:1px solid var(--gold-dim);
  border-radius:var(--radius);padding:8px 14px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:.75rem;
  width:0;opacity:0;outline:none;transition:width .3s,opacity .3s;
}
#search.open{width:200px;opacity:1}
#search-btn{
  background:rgba(11,18,32,.9);border:1px solid var(--gold-dim);
  border-radius:var(--radius);padding:8px 12px;
  color:var(--gold);cursor:pointer;font-size:.9rem;
  transition:background .2s;
}
#search-btn:hover{background:rgba(201,168,76,.15)}

/* ── STATS ── */
#stats{
  position:fixed;bottom:44px;left:28px;z-index:10;pointer-events:none;
  display:flex;gap:20px;
}
.stat{text-align:center}
.stat .n{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--gold);font-weight:300}
.stat .l{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}

/* ── LOADING ── */
#loading{
  position:fixed;inset:0;background:var(--dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;transition:opacity .8s;
}
#loading.fade{opacity:0;pointer-events:none}
.ring{
  width:52px;height:52px;border-radius:50%;
  border:1px solid rgba(201,168,76,.15);border-top-color:var(--gold);
  animation:spin 1.1s linear infinite;margin-bottom:18px;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted)}

/* ── MOBILE ── */
@media(max-width:600px){
  #panel{right:10px;width:calc(100vw - 20px)}
  #panel.on{transform:translateY(-50%) translateX(0)}
  #stats{display:none}
  #search-wrap{top:14px;right:14px}
}
</style>
</head>
<body>

<div id="loading"><div class="ring"></div><p>Yükleniyor…</p></div>

<div id="c"></div>

<div id="hd">
  <h1>Tango <em>World</em></h1>
  <p id="ev-count">— etkinlik yükleniyor</p>
</div>

<div id="search-wrap">
  <input id="search" type="text" placeholder="Şehir veya etkinlik ara…" autocomplete="off">
  <button id="search-btn" title="Ara">⌕</button>
</div>

<div id="panel">
  <button id="pcls">✕</button>
  <div class="ptag">Etkinlik</div>
  <div id="pname">—</div>
  <div class="prow"><span class="ic">📍</span><div><strong id="pcity">—</strong><span id="pcountry"></span></div></div>
  <div class="prow"><span class="ic">📅</span><div id="pdate">—</div></div>
  <a id="plink" href="#" target="_blank" rel="noopener">Etkinliğe Git →</a>
</div>

<div id="clist">
  <div id="clist-hd">
    <h3 id="clist-title">Etkinlikler</h3>
    <button id="clist-cls">✕</button>
  </div>
  <div id="clist-body"></div>
</div>

<div id="tip"></div>

<div id="stats">
  <div class="stat"><div class="n" id="s-total">0</div><div class="l">Etkinlik</div></div>
  <div class="stat"><div class="n" id="s-country">0</div><div class="l">Ülke</div></div>
</div>

<div id="ft">
  <p>Sürükle · Döndür</p>
  <p>Noktaya tıkla</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG — JSON dosyan için bu URL'yi değiştir
// ═══════════════════════════════════════════════════════════════
const DATA_URL = './events.json'; // null = demo veri kullan. Gerçek: './events.json'

// ═══════════════════════════════════════════════════════════════
//  DEMO VERİ (DATA_URL null olduğunda kullanılır)
// ═══════════════════════════════════════════════════════════════
const DEMO_EVENTS = [
  {eventName:"Tango Summer Festival Heidelberg",startDate:"2026-09-07",endDate:"2026-09-13",city:"Heidelberg",country:"Germany",latitude:49.41,longitude:8.69,eventUrl:"https://www.tangopolix.com/tango-summer-festival-heidelberg-2026"},

  {eventName:"Paris Tango Marathon",startDate:"2026-07-14",endDate:"2026-07-17",city:"Paris",country:"France",latitude:48.86,longitude:2.35,eventUrl:"#"},

  {eventName:"New York Tango Week",startDate:"2026-06-15",endDate:"2026-06-21",city:"New York",country:"USA",latitude:40.71,longitude:-74.01,eventUrl:"#"},
  {eventName:"Rome Tango Encuentro",startDate:"2026-09-20",endDate:"2026-09-24",city:"Rome",country:"Italy",latitude:41.90,longitude:12.50,eventUrl:"#"},

  {eventName:"Amsterdam Tango Salon",startDate:"2026-07-04",endDate:"2026-07-07",city:"Amsterdam",country:"Netherlands",latitude:52.37,longitude:4.90,eventUrl:"#"},
  {eventName:"Prague Tango Marathon",startDate:"2026-10-23",endDate:"2026-10-26",city:"Prague",country:"Czech Republic",latitude:50.08,longitude:14.44,eventUrl:"#"},
  {eventName:"Sydney Tango Festival",startDate:"2026-05-01",endDate:"2026-05-05",city:"Sydney",country:"Australia",latitude:-33.87,longitude:151.21,eventUrl:"#"},
  {eventName:"Barcelona Tango Encuentro",startDate:"2026-06-01",endDate:"2026-06-05",city:"Barcelona",country:"Spain",latitude:41.39,longitude:2.17,eventUrl:"#"},
  {eventName:"Berlin Tango Festival",startDate:"2026-09-10",endDate:"2026-09-14",city:"Berlin",country:"Germany",latitude:52.52,longitude:13.41,eventUrl:"#"},
  {eventName:"Vienna Tango Weekend",startDate:"2026-08-01",endDate:"2026-08-03",city:"Vienna",country:"Austria",latitude:48.21,longitude:16.37,eventUrl:"#"},
  {eventName:"London Tango Marathon",startDate:"2026-07-25",endDate:"2026-07-28",city:"London",country:"UK",latitude:51.51,longitude:-0.13,eventUrl:"#"},
  {eventName:"Moscow Tango Festival",startDate:"2026-10-15",endDate:"2026-10-19",city:"Moscow",country:"Russia",latitude:55.75,longitude:37.62,eventUrl:"#"},
  {eventName:"Seoul Tango Festival",startDate:"2026-09-01",endDate:"2026-09-05",city:"Seoul",country:"South Korea",latitude:37.57,longitude:126.98,eventUrl:"#"},
  {eventName:"São Paulo Tango Week",startDate:"2026-07-20",endDate:"2026-07-25",city:"São Paulo",country:"Brazil",latitude:-23.55,longitude:-46.63,eventUrl:"#"},
  {eventName:"Mexico City Tango",startDate:"2026-08-15",endDate:"2026-08-18",city:"Mexico City",country:"Mexico",latitude:19.43,longitude:-99.13,eventUrl:"#"},
  {eventName:"Lisbon Tango Milonga",startDate:"2026-06-10",endDate:"2026-06-13",city:"Lisbon",country:"Portugal",latitude:38.72,longitude:-9.14,eventUrl:"#"},
  {eventName:"Warsaw Tango Festival",startDate:"2026-10-08",endDate:"2026-10-12",city:"Warsaw",country:"Poland",latitude:52.23,longitude:21.01,eventUrl:"#"},
  {eventName:"Helsinki Tango Festival",startDate:"2026-07-07",endDate:"2026-07-11",city:"Helsinki",country:"Finland",latitude:60.17,longitude:24.94,eventUrl:"#"},
  {eventName:"Zurich Tango Weekend",startDate:"2026-08-20",endDate:"2026-08-23",city:"Zurich",country:"Switzerland",latitude:47.38,longitude:8.54,eventUrl:"#"},
  {eventName:"Athens Tango Festival",startDate:"2026-09-15",endDate:"2026-09-19",city:"Athens",country:"Greece",latitude:37.98,longitude:23.73,eventUrl:"#"},
  {eventName:"Kiev Tango Marathon",startDate:"2026-06-20",endDate:"2026-06-23",city:"Kiev",country:"Ukraine",latitude:50.45,longitude:30.52,eventUrl:"#"},
];

// ═══════════════════════════════════════════════════════════════
//  SCENE SETUP
// ═══════════════════════════════════════════════════════════════
const W=()=>window.innerWidth, H=()=>window.innerHeight;
const container=document.getElementById('c');

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W(),H());
renderer.setClearColor(0x060a12,1);
container.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,W()/H(),.1,1000);
camera.position.z=2.8;

// Stars — single instanced Points (fast)
{
  const N=2500, pos=new Float32Array(N*3);
  for(let i=0;i<N*3;i++) pos[i]=(Math.random()-.5)*120;
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:.05,transparent:true,opacity:.55})));
}

// Globe — NASA Blue Marble texture (public domain)
const texLoader = new THREE.TextureLoader();
const globeGeo  = new THREE.SphereGeometry(1, 64, 64);
const globeMat  = new THREE.MeshPhongMaterial({
  map:         texLoader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
  specularMap: texLoader.load('https://unpkg.com/three-globe/example/img/earth-water.png'),
  specular:    new THREE.Color(0x334466),
  shininess:   28,
});
const globe = new THREE.Mesh(globeGeo, globeMat);
scene.add(globe);

// Gece tarafı overlay
const nightMat = new THREE.MeshPhongMaterial({
  map:        texLoader.load('https://unpkg.com/three-globe/example/img/earth-night.jpg'),
  transparent:true,
  opacity:    0.6,
  blending:   THREE.MultiplyBlending,
  depthWrite: false,
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.001, 64, 64), nightMat));

// Atmosphere
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(1.035,64,64),
  new THREE.MeshPhongMaterial({color:0x1a4488,transparent:true,opacity:.1,side:THREE.FrontSide})
));

// Lights
scene.add(new THREE.AmbientLight(0x2233aa,.45));
const sun=new THREE.DirectionalLight(0xffeedd,1.1);sun.position.set(5,3,5);scene.add(sun);
const rim=new THREE.DirectionalLight(0x1a3a88,.45);rim.position.set(-4,-2,-4);scene.add(rim);

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
function ll2xyz(lat,lon,r=1){
  const phi=(90-lat)*Math.PI/180, theta=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));
}

function fmtDate(s,e){
  const fmt=d=>new Date(d).toLocaleDateString('tr-TR',{day:'numeric',month:'short',year:'numeric'});
  return fmt(s)+' — '+fmt(e);
}

// ═══════════════════════════════════════════════════════════════
//  CLUSTERING (geographic grid bucketing)
// ═══════════════════════════════════════════════════════════════
function cluster(events,gridDeg=8){
  const map={};
  events.forEach(ev=>{
    const bk=`${Math.round(ev.latitude/gridDeg)}:${Math.round(ev.longitude/gridDeg)}`;
    if(!map[bk]) map[bk]=[];
    map[bk].push(ev);
  });
  return Object.values(map).map(arr=>{
    const lat=arr.reduce((s,e)=>s+e.latitude,0)/arr.length;
    const lon=arr.reduce((s,e)=>s+e.longitude,0)/arr.length;
    return {events:arr,lat,lon,count:arr.length};
  });
}

// ═══════════════════════════════════════════════════════════════
//  MARKER SYSTEM  (InstancedMesh = 1 draw call for all dots)
// ═══════════════════════════════════════════════════════════════
let EVENTS=[], clusters=[];
const markerGroup=new THREE.Group();
scene.add(markerGroup);

// Two instanced meshes: dots + rings
const DOT_GEO=new THREE.CircleGeometry(.013,20);
const RING_GEO=new THREE.RingGeometry(.018,.027,28);
const MAT_DOT=new THREE.MeshBasicMaterial({color:0xe8c97a,transparent:true,opacity:.95,side:THREE.DoubleSide});
const MAT_RING=new THREE.MeshBasicMaterial({color:0xc9a84c,transparent:true,opacity:.7,side:THREE.DoubleSide});
const MAT_CLUSTER=new THREE.MeshBasicMaterial({color:0xe8c97a,transparent:true,opacity:.85,side:THREE.DoubleSide});
const RING_BIG_GEO=new THREE.RingGeometry(.025,.038,28);

let instDot=null, instRing=null, instClusterDot=null, instClusterRing=null;
let pulseObjs=[]; // {mesh, phase, scale0}
const dummy=new THREE.Object3D();

// Sprite canvas for cluster count label
function makeCountTex(n){
  const c=document.createElement('canvas');c.width=64;c.height=64;
  const x=c.getContext('2d');
  x.fillStyle='rgba(201,168,76,.9)';x.beginPath();x.arc(32,32,26,0,Math.PI*2);x.fill();
  x.fillStyle='#060a12';x.font='bold 20px sans-serif';
  x.textAlign='center';x.textBaseline='middle';x.fillText(n>99?'99+':n,32,33);
  return new THREE.CanvasTexture(c);
}

const clusterSprites=[]; // {sprite, mesh}

function buildMarkers(){
  // Remove old
  while(markerGroup.children.length>0) markerGroup.remove(markerGroup.children[0]);
  if(instDot){instDot.geometry.dispose();instRing.geometry.dispose();}
  clusterSprites.length=0;
  pulseObjs.length=0;

  const singles=clusters.filter(c=>c.count===1);
  const multi=clusters.filter(c=>c.count>1);

  // Single-event dots (InstancedMesh)
  const N=singles.length;
  if(N>0){
    instDot=new THREE.InstancedMesh(DOT_GEO,MAT_DOT,N);
    instRing=new THREE.InstancedMesh(RING_GEO,MAT_RING,N);
    instDot.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    instRing.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    singles.forEach((cl,i)=>{
      const pos=ll2xyz(cl.lat,cl.lon,1.012);
      dummy.position.copy(pos);dummy.lookAt(pos.clone().multiplyScalar(2));dummy.updateMatrix();
      instDot.setMatrixAt(i,dummy.matrix);
      instRing.setMatrixAt(i,dummy.matrix);
    });
    instDot.instanceMatrix.needsUpdate=true;
    instRing.instanceMatrix.needsUpdate=true;
    markerGroup.add(instDot);
    markerGroup.add(instRing);
  }

  // Multi-event clusters
  multi.forEach(cl=>{
    const pos=ll2xyz(cl.lat,cl.lon,1.014);
    // Cluster dot (bigger)
    dummy.position.copy(pos);dummy.lookAt(pos.clone().multiplyScalar(2));dummy.scale.setScalar(1.8);dummy.updateMatrix();
    const cdot=new THREE.Mesh(new THREE.CircleGeometry(.016,20),MAT_CLUSTER.clone());
    cdot.matrix.copy(dummy.matrix);cdot.matrixAutoUpdate=false;
    const cring=new THREE.Mesh(RING_BIG_GEO,MAT_RING.clone());
    cring.matrix.copy(dummy.matrix);cring.matrixAutoUpdate=false;
    markerGroup.add(cdot);markerGroup.add(cring);

    // Sprite with count
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:makeCountTex(cl.count),transparent:true,depthTest:false}));
    sp.scale.set(.12,.12,1);sp.position.copy(pos).multiplyScalar(1.06);
    markerGroup.add(sp);
    clusterSprites.push({sp,cl});
    pulseObjs.push({mesh:cring,phase:Math.random()*Math.PI*2,base:.7});
  });

  // Invisible hit spheres (for raycasting) — one per cluster
  hitSpheres.length=0;
  clusters.forEach(cl=>{
    const pos=ll2xyz(cl.lat,cl.lon,1.012);
    const hs=new THREE.Mesh(
      new THREE.SphereGeometry(cl.count>1?.07:.045,6,6),
      new THREE.MeshBasicMaterial({transparent:true,opacity:0})
    );
    hs.position.copy(pos);
    hs.userData.cl=cl;
    markerGroup.add(hs);
    hitSpheres.push(hs);
  });
}

const hitSpheres=[];

// ═══════════════════════════════════════════════════════════════
//  DATA LOADING
// ═══════════════════════════════════════════════════════════════
async function loadData(){
  if(DATA_URL){
    const res=await fetch(DATA_URL);
    EVENTS=await res.json();
  } else {
    EVENTS=DEMO_EVENTS;
  }
  // Stats
  const countries=new Set(EVENTS.map(e=>e.country));
  document.getElementById('ev-count').textContent=EVENTS.length+' etkinlik · '+countries.size+' ülke';
  document.getElementById('s-total').textContent=EVENTS.length;
  document.getElementById('s-country').textContent=countries.size;

  clusters=cluster(EVENTS,8);
  buildMarkers();
}

// ═══════════════════════════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════════════════════════
const panel=document.getElementById('panel');
const clist=document.getElementById('clist');
const tip=document.getElementById('tip');
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();

let isDrag=false,prevM={x:0,y:0},autoRot=true,velY=0,velX=0,selCl=null;

function showPanel(ev){
  document.getElementById('pname').textContent=ev.eventName;
  document.getElementById('pcity').textContent=ev.city+', ';
  document.getElementById('pcountry').textContent=ev.country;
  document.getElementById('pdate').textContent=fmtDate(ev.startDate,ev.endDate);
  const lnk=document.getElementById('plink');
  lnk.href=ev.eventUrl||'#';
  lnk.style.opacity=(!ev.eventUrl||ev.eventUrl==='#')?.4:1;
  lnk.style.pointerEvents=(!ev.eventUrl||ev.eventUrl==='#')?'none':'auto';
  panel.classList.add('on');clist.classList.remove('on');
}

function showCluster(cl){
  if(cl.count===1){showPanel(cl.events[0]);return;}
  document.getElementById('clist-title').textContent=cl.city||cl.events[0].country+' — '+cl.count+' etkinlik';
  const body=document.getElementById('clist-body');
  body.innerHTML=cl.events.map((ev,i)=>`
    <div class="citem" data-i="${i}">
      <div class="citem-name">${ev.eventName}</div>
      <div class="citem-meta">${ev.city}, ${ev.country} · ${new Date(ev.startDate).toLocaleDateString('tr-TR',{day:'numeric',month:'short'})}</div>
    </div>`).join('');
  body.querySelectorAll('.citem').forEach(el=>{
    el.addEventListener('click',()=>showPanel(cl.events[+el.dataset.i]));
  });
  clist.classList.add('on');panel.classList.remove('on');
}

document.getElementById('pcls').addEventListener('click',()=>panel.classList.remove('on'));
document.getElementById('clist-cls').addEventListener('click',()=>clist.classList.remove('on'));

function pick(e){
  const rect=renderer.domElement.getBoundingClientRect();
  const x=((e.clientX-rect.left)/rect.width)*2-1;
  const y=-((e.clientY-rect.top)/rect.height)*2+1;
  mouse.set(x,y);
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(hitSpheres);
  if(hits.length){showCluster(hits[0].object.userData.cl);return true;}
  panel.classList.remove('on');clist.classList.remove('on');
  return false;
}

function hoverCheck(e){
  if(isDrag){tip.classList.remove('on');return;}
  const rect=renderer.domElement.getBoundingClientRect();
  mouse.set(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1);
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(hitSpheres);
  if(hits.length){
    const cl=hits[0].object.userData.cl;
    tip.textContent=cl.count===1?cl.events[0].city+', '+cl.events[0].country:cl.count+' etkinlik';
    tip.style.left=e.clientX+'px';tip.style.top=e.clientY+'px';
    tip.classList.add('on');container.style.cursor='pointer';
  } else {
    tip.classList.remove('on');
    container.style.cursor=isDrag?'grabbing':'grab';
  }
}

// Mouse
container.addEventListener('mousedown',e=>{
  isDrag=false;prevM={x:e.clientX,y:e.clientY};
  const MM=ev=>{
    const dx=ev.clientX-prevM.x,dy=ev.clientY-prevM.y;
    if(Math.abs(dx)>2||Math.abs(dy)>2) isDrag=true;
    if(isDrag){
      velY=dx*.005;velX=dy*.004;
      globe.rotation.y+=dx*.004;globe.rotation.x+=dy*.003;
      markerGroup.rotation.y=globe.rotation.y;markerGroup.rotation.x=globe.rotation.x;
      autoRot=false;
    }
    prevM={x:ev.clientX,y:ev.clientY};
  };
  const MU=ev=>{
    window.removeEventListener('mousemove',MM);window.removeEventListener('mouseup',MU);
    if(!isDrag) pick(ev);
    setTimeout(()=>{autoRot=true;},2000);
  };
  window.addEventListener('mousemove',MM);window.addEventListener('mouseup',MU);
});
container.addEventListener('mousemove',hoverCheck);

// Touch
let t0=null;
container.addEventListener('touchstart',e=>{t0={x:e.touches[0].clientX,y:e.touches[0].clientY,moved:false};},{passive:true});
container.addEventListener('touchmove',e=>{
  if(!t0) return;
  const dx=e.touches[0].clientX-t0.x,dy=e.touches[0].clientY-t0.y;
  if(Math.abs(dx)>4||Math.abs(dy)>4) t0.moved=true;
  if(t0.moved){
    velY=dx*.004;velX=dy*.003;
    globe.rotation.y+=dx*.003;globe.rotation.x+=dy*.0025;
    markerGroup.rotation.y=globe.rotation.y;markerGroup.rotation.x=globe.rotation.x;
    autoRot=false;
  }
  t0.x=e.touches[0].clientX;t0.y=e.touches[0].clientY;
},{passive:true});
container.addEventListener('touchend',e=>{
  if(t0&&!t0.moved) pick({clientX:e.changedTouches[0].clientX,clientY:e.changedTouches[0].clientY});
  setTimeout(()=>{autoRot=true;},2000);t0=null;
},{passive:true});

// Resize
window.addEventListener('resize',()=>{
  camera.aspect=W()/H();camera.updateProjectionMatrix();
  renderer.setSize(W(),H());
});

// ═══════════════════════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════════════════════
const searchEl=document.getElementById('search');
const searchBtn=document.getElementById('search-btn');
let searchOpen=false;

searchBtn.addEventListener('click',()=>{
  searchOpen=!searchOpen;
  searchEl.classList.toggle('open',searchOpen);
  if(searchOpen) searchEl.focus(); else {searchEl.value='';renderSearch('');}
});

searchEl.addEventListener('input',e=>renderSearch(e.target.value.trim().toLowerCase()));
searchEl.addEventListener('keydown',e=>{if(e.key==='Escape'){searchOpen=false;searchEl.classList.remove('open');searchEl.value='';renderSearch('');}});

function renderSearch(q){
  if(!q){hitSpheres.forEach(h=>{h.visible=true;});return;}
  hitSpheres.forEach(h=>{
    const cl=h.userData.cl;
    const match=cl.events.some(ev=>
      ev.city.toLowerCase().includes(q)||ev.country.toLowerCase().includes(q)||ev.eventName.toLowerCase().includes(q)
    );
    h.visible=match;
  });
  // Show first match in panel
  const first=hitSpheres.find(h=>h.visible&&h.userData.cl);
  if(first&&q.length>2) showCluster(first.userData.cl);
}

// ═══════════════════════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════════════════════
let frame=0;
function animate(){
  requestAnimationFrame(animate);
  frame++;
  const t=frame*.016;

  if(autoRot){
    velY+=(0.0012-velY)*.05;
    globe.rotation.y+=velY;
    markerGroup.rotation.y=globe.rotation.y;
  } else {
    globe.rotation.y+=velY;globe.rotation.x+=velX;
    markerGroup.rotation.y=globe.rotation.y;markerGroup.rotation.x=globe.rotation.x;
    velY*=.92;velX*=.92;
  }

  // Pulse cluster rings
  pulseObjs.forEach(p=>{
    const ph=(t*1.8+p.phase)%(Math.PI*2);
    const v=(Math.sin(ph)+1)/2;
    p.mesh.material.opacity=p.base+v*.25;
    const s=.85+v*.35;
    p.mesh.scale.setScalar(s);
  });

  // Star drift
  scene.children[0].rotation.y=t*.008;

  renderer.render(scene,camera);
}

// ═══════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════
let introP=0;
function boot(){
  introP+=.014;
  const ease=1-Math.pow(1-Math.min(introP,1),3);
  camera.position.z=6-ease*3.2;
  renderer.render(scene,camera);
  if(introP<1){requestAnimationFrame(boot);}
  else{camera.position.z=2.8;animate();}
}

loadData().then(()=>{
  boot();
  const ld=document.getElementById('loading');
  ld.classList.add('fade');
  setTimeout(()=>ld.remove(),900);
}).catch(err=>{
  console.error(err);
  document.getElementById('loading').querySelector('p').textContent='Hata: '+err.message;
});
</script>
</body>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TangoNet World — Global Events</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;--gold-dim:rgba(201,168,76,0.3);
  --dark:#060a12;--panel:#0b1220ee;--text:#e2d9c8;--muted:#7a7060;
  --r:6px;
}
html,body{width:100%;height:100%;background:var(--dark);color:var(--text);
  font-family:'DM Sans',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}
#c{position:fixed;inset:0;cursor:grab}
#c:active{cursor:grabbing}
canvas{display:block}

#hd{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;
  padding:22px 28px 60px;
  background:linear-gradient(to bottom,rgba(6,10,18,.95) 0%,transparent 100%)}
#hd h1{font-family:'Cormorant Garamond',serif;font-weight:300;
  font-size:clamp(1.4rem,4vw,2.1rem);letter-spacing:.06em;line-height:1}
#hd h1 em{color:var(--gold);font-style:italic}
#hd p{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:5px}

#panel{position:fixed;top:50%;right:20px;
  transform:translateY(-50%) translateX(calc(100% + 24px));
  width:min(300px,calc(100vw - 40px));
  background:var(--panel);border:1px solid var(--gold-dim);border-radius:var(--r);
  padding:24px;z-index:20;transition:transform .45s cubic-bezier(.23,1,.32,1);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
#panel.on{transform:translateY(-50%) translateX(0)}
#pcls{position:absolute;top:12px;right:14px;background:none;border:none;
  color:var(--muted);font-size:1rem;cursor:pointer;transition:color .2s;
  line-height:1;font-family:'DM Sans',sans-serif}
#pcls:hover{color:var(--gold)}
.ptag{font-size:.58rem;letter-spacing:.25em;text-transform:uppercase;
  color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ptag::after{content:'';flex:1;height:1px;background:var(--gold-dim)}
#pname{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:300;
  line-height:1.3;margin-bottom:18px}
.prow{display:flex;gap:10px;margin-bottom:11px;font-size:.75rem;color:var(--muted);line-height:1.5}
.prow .ic{color:var(--gold);width:13px;flex-shrink:0;margin-top:2px}
.prow strong{color:var(--text);font-weight:400;display:block}
#plink{display:block;margin-top:20px;padding:10px 0;
  border:1px solid var(--gold-dim);border-radius:var(--r);
  text-align:center;text-decoration:none;color:var(--gold);
  font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;transition:all .25s}
#plink:hover{background:var(--gold);color:var(--dark)}

#clist{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.96);
  width:min(360px,calc(100vw - 32px));max-height:70vh;
  background:var(--panel);border:1px solid var(--gold-dim);border-radius:var(--r);
  padding:0;z-index:25;opacity:0;pointer-events:none;
  transition:all .35s cubic-bezier(.23,1,.32,1);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  overflow:hidden;display:flex;flex-direction:column}
#clist.on{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
#clist-hd{padding:16px 20px;border-bottom:1px solid var(--gold-dim);
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
#clist-hd h3{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.1rem}
#clist-cls{background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:1rem;font-family:'DM Sans',sans-serif}
#clist-cls:hover{color:var(--gold)}
#clist-body{overflow-y:auto;flex:1}
#clist-body::-webkit-scrollbar{width:3px}
#clist-body::-webkit-scrollbar-thumb{background:var(--gold-dim)}
.citem{padding:14px 20px;border-bottom:1px solid rgba(201,168,76,.08);
  cursor:pointer;transition:background .15s}
.citem:hover{background:rgba(201,168,76,.07)}
.citem:last-child{border-bottom:none}
.citem-name{font-size:.82rem;color:var(--text);margin-bottom:3px;line-height:1.35}
.citem-meta{font-size:.68rem;color:var(--muted)}

#tip{position:fixed;pointer-events:none;z-index:30;
  background:rgba(6,10,18,.96);border:1px solid var(--gold-dim);
  border-radius:var(--r);padding:7px 12px;
  font-size:.7rem;color:var(--text);letter-spacing:.03em;
  white-space:nowrap;transform:translate(-50%,-130%);
  opacity:0;transition:opacity .15s}
#tip.on{opacity:1}

#ft{position:fixed;bottom:0;left:0;right:0;z-index:10;pointer-events:none;
  padding:50px 28px 18px;
  background:linear-gradient(to top,rgba(6,10,18,.85) 0%,transparent 100%);
  display:flex;justify-content:space-between;align-items:flex-end}
#ft p{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}

#search-wrap{position:fixed;top:20px;right:20px;z-index:15;display:flex;align-items:center}
#search{background:rgba(11,18,32,.9);border:1px solid var(--gold-dim);border-radius:var(--r);
  padding:8px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.75rem;
  width:0;opacity:0;outline:none;transition:width .3s,opacity .3s}
#search.open{width:200px;opacity:1}
#search-btn{background:rgba(11,18,32,.9);border:1px solid var(--gold-dim);border-radius:var(--r);
  padding:8px 12px;color:var(--gold);cursor:pointer;font-size:.9rem;transition:background .2s}
#search-btn:hover{background:rgba(201,168,76,.15)}

#stats{position:fixed;bottom:44px;left:28px;z-index:10;pointer-events:none;display:flex;gap:20px}
.stat{text-align:center}
.stat .n{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--gold);font-weight:300}
.stat .l{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}

#loading{position:fixed;inset:0;background:var(--dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;transition:opacity .8s}
#loading.fade{opacity:0;pointer-events:none}
.ring{width:52px;height:52px;border-radius:50%;
  border:1px solid rgba(201,168,76,.15);border-top-color:var(--gold);
  animation:spin 1.1s linear infinite;margin-bottom:18px}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted)}

@media(max-width:600px){
  #panel{right:10px;width:calc(100vw - 20px)}
  #stats{display:none}
  #search-wrap{top:14px;right:14px}
}
</style>
</head>
<body>
<div id="loading"><div class="ring"></div><p>Yükleniyor…</p></div>
<div id="c"></div>
<div id="hd">
  <h1>TangoNet <em>World</em></h1>
  <p id="ev-count">— etkinlik yükleniyor</p>
</div>
<div id="search-wrap">
  <input id="search" type="text" placeholder="Şehir veya etkinlik ara…" autocomplete="off">
  <button id="search-btn" title="Ara">⌕</button>
</div>
<div id="panel">
  <button id="pcls">✕</button>
  <div class="ptag">Etkinlik</div>
  <div id="pname">—</div>
  <div class="prow"><span class="ic">📍</span><div><strong id="pcity">—</strong><span id="pcountry"></span></div></div>
  <div class="prow"><span class="ic">📅</span><div id="pdate">—</div></div>
  <a id="plink" href="#" target="_blank" rel="noopener">Etkinliğe Git →</a>
</div>
<div id="clist">
  <div id="clist-hd">
    <h3 id="clist-title">Etkinlikler</h3>
    <button id="clist-cls">✕</button>
  </div>
  <div id="clist-body"></div>
</div>
<div id="tip"></div>
<div id="stats">
  <div class="stat"><div class="n" id="s-total">0</div><div class="l">Etkinlik</div></div>
  <div class="stat"><div class="n" id="s-country">0</div><div class="l">Ülke</div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  {eventName:"Athens Tango Festival",startDate:"2026-09-15",endDate:"2026-09-19",city:"Athens",country:"Greece",latitude:37.98,longitude:23.73,eventUrl:"#"},
  {eventName:"Kiev Tango Marathon",startDate:"2026-06-20",endDate:"2026-06-23",city:"Kiev",country:"Ukraine",latitude:50.45,longitude:30.52,eventUrl:"#"},
  {eventName:"Moscow Tango Festival",startDate:"2026-10-15",endDate:"2026-10-19",city:"Moscow",country:"Russia",latitude:55.75,longitude:37.62,eventUrl:"#"},
];

// ═══════════════════════════════════════════
//  SCENE SETUP
// ═══════════════════════════════════════════
const W=()=>window.innerWidth, H=()=>window.innerHeight;
const container=document.getElementById('c');

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W(),H());
renderer.setClearColor(0x060a12,1);
container.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,W()/H(),.1,1000);
camera.position.z=2.8;

// Stars
{
  const N=2500,pos=new Float32Array(N*3);
  for(let i=0;i<N*3;i++) pos[i]=(Math.random()-.5)*120;
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:.05,transparent:true,opacity:.5})));
}

// ═══════════════════════════════════════════
//  GLOBE — MeshPhongMaterial with bump + specular for much better look
//  Texture: original blue-marble (good colors) + topology bump + water specular
// ═══════════════════════════════════════════
const texLoader=new THREE.TextureLoader();
const globeGeo=new THREE.SphereGeometry(1,96,96);

const globeMat=new THREE.MeshPhongMaterial({
  shininess: 8,
  specular: new THREE.Color(0x112244),
});
const globe=new THREE.Mesh(globeGeo,globeMat);
scene.add(globe);

// Textures — load in order of priority
const TEX_BASE = 'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg';
const TEX_BUMP = 'https://unpkg.com/three-globe/example/img/earth-topology.png';
const TEX_WATER = 'https://unpkg.com/three-globe/example/img/earth-water.png';
// Solarsystemscope textures are MIT-licensed NASA data, served via unpkg
const TEX_DAY_HR = 'https://unpkg.com/three-globe/example/img/earth-day.jpg';

texLoader.load(TEX_BASE, t=>{
  t.anisotropy=renderer.capabilities.getMaxAnisotropy();
  globeMat.map=t; globeMat.needsUpdate=true;
});
texLoader.load(TEX_BUMP, t=>{
  globeMat.bumpMap=t; globeMat.bumpScale=0.012; globeMat.needsUpdate=true;
});
texLoader.load(TEX_WATER, t=>{
  globeMat.specularMap=t; globeMat.needsUpdate=true;
});

// Atmosphere
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(1.02,64,64),
  new THREE.MeshBasicMaterial({color:0x1a4488,transparent:true,opacity:.07,side:THREE.BackSide})
));

// Lighting — directional from upper-right like sunlight
const sun=new THREE.DirectionalLight(0xfff5e0,1.1);
sun.position.set(5,3,5);
scene.add(sun);
scene.add(new THREE.AmbientLight(0x334466,0.7));

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function ll2xyz(lat,lon,r=1){
  const phi=(90-lat)*Math.PI/180, theta=(lon+180)*Math.PI/180;
  return new THREE.Vector3(
    -r*Math.sin(phi)*Math.cos(theta),
     r*Math.cos(phi),
     r*Math.sin(phi)*Math.sin(theta)
  );
}
function fmtDate(s,e){
  const fmt=d=>new Date(d).toLocaleDateString('tr-TR',{day:'numeric',month:'short',year:'numeric'});
  return fmt(s)+' — '+fmt(e);
}

// ═══════════════════════════════════════════
//  CLUSTER GRID — very fine at close zoom
// ═══════════════════════════════════════════
function gridDegForZoom(z){
  if(z>4.5) return 14;
  if(z>3.5) return 10;
  if(z>2.8) return 7;
  if(z>2.2) return 4;
  if(z>1.8) return 2.5;
  if(z>1.5) return 1.5;
  if(z>1.3) return 0.8;
  return 0.4;
}

function buildClusters(events,gridDeg){
  const map={};
  events.forEach(ev=>{
    const bk=`${Math.round(ev.latitude/gridDeg)}:${Math.round(ev.longitude/gridDeg)}`;
    if(!map[bk]) map[bk]=[];
    map[bk].push(ev);
  });
  return Object.values(map).map(arr=>{
    const lat=arr.reduce((s,e)=>s+e.latitude,0)/arr.length;
    const lon=arr.reduce((s,e)=>s+e.longitude,0)/arr.length;
    return {events:arr,lat,lon,count:arr.length};
  });
}

// ═══════════════════════════════════════════
//  MARKERS — redesigned: clean minimal dots/pills
//  Single: simple glowing dot (no outer ring, no gradient fill)
//  Cluster: compact pill with number
//  All rendered at fixed SCREEN size (constant pixels regardless of zoom)
// ═══════════════════════════════════════════

// Single marker: small clean dot with soft glow ring
function makeSingleTex(){
  const S=64;
  const c=document.createElement('canvas');c.width=S;c.height=S;
  const x=c.getContext('2d');
  const cx=S/2,cy=S/2;
  // soft outer glow
  const glow=x.createRadialGradient(cx,cy,6,cx,cy,28);
  glow.addColorStop(0,'rgba(201,168,76,0.35)');
  glow.addColorStop(1,'rgba(201,168,76,0)');
  x.fillStyle=glow;
  x.beginPath();x.arc(cx,cy,28,0,Math.PI*2);x.fill();
  // solid core
  x.beginPath();x.arc(cx,cy,7,0,Math.PI*2);
  x.fillStyle='rgba(201,168,76,1)';x.fill();
  // bright centre highlight
  x.beginPath();x.arc(cx-2,cy-2,2.5,0,Math.PI*2);
  x.fillStyle='rgba(255,245,180,0.8)';x.fill();
  return new THREE.CanvasTexture(c);
}

// Cluster pill: compact, minimal, number only
function makeClusterTex(n){
  const label=n>99?'99+':String(n);
  const fsize=18;
  const tmp=document.createElement('canvas');
  const tx=tmp.getContext('2d');
  tx.font=`600 ${fsize}px system-ui,sans-serif`;
  const tw=tx.measureText(label).width;
  const padH=10, padV=6;
  const W2=Math.ceil(tw+padH*2), H2=fsize+padV*2;
  const c=document.createElement('canvas');c.width=W2;c.height=H2;
  const x=c.getContext('2d');
  const r=H2/2;
  // background — solid gold, fully opaque
  x.fillStyle='rgba(201,168,76,0.95)';
  x.beginPath();
  x.moveTo(r,0);x.lineTo(W2-r,0);
  x.arcTo(W2,0,W2,H2,r);
  x.lineTo(W2-r,H2);x.arcTo(0,H2,0,0,r);
  x.lineTo(r,0);x.closePath();x.fill();
  // thin border
  x.strokeStyle='rgba(255,255,255,0.3)';x.lineWidth=1;
  x.beginPath();
  x.moveTo(r,0);x.lineTo(W2-r,0);
  x.arcTo(W2,0,W2,H2,r);
  x.lineTo(W2-r,H2);x.arcTo(0,H2,0,0,r);
  x.lineTo(r,0);x.closePath();x.stroke();
  // number — dark brown for contrast
  x.fillStyle='#1a0a00';
  x.font=`600 ${fsize}px system-ui,sans-serif`;
  x.textAlign='center';x.textBaseline='middle';
  x.fillText(label,W2/2,H2/2+0.5);
  return {tex:new THREE.CanvasTexture(c), aspect:W2/H2};
}

const singleTex=makeSingleTex();
const clusterTexCache={};
function getClusterTex(n){
  if(!clusterTexCache[n]) clusterTexCache[n]=makeClusterTex(n);
  return clusterTexCache[n];
}

// ═══════════════════════════════════════════
//  MARKER MANAGER
// ═══════════════════════════════════════════
const markerGroup=new THREE.Group();
scene.add(markerGroup);
let allMarkers=[];
let EVENTS=[];
let prevGridDeg=-1;

function clearMarkers(){
  allMarkers.forEach(m=>{
    markerGroup.remove(m.sprite);markerGroup.remove(m.hitMesh);
    m.sprite.material.dispose();
  });
  allMarkers=[];
}

function buildMarkersForClusters(cls){
  clearMarkers();
  cls.forEach(cl=>{
    let mat,aspect=1;
    if(cl.count===1){
      mat=new THREE.SpriteMaterial({map:singleTex,transparent:true,opacity:0,depthTest:false,sizeAttenuation:true});
    } else {
      const {tex,aspect:a}=getClusterTex(cl.count);
      aspect=a;
      mat=new THREE.SpriteMaterial({map:tex,transparent:true,opacity:0,depthTest:false,sizeAttenuation:true});
    }
    const sp=new THREE.Sprite(mat);
    sp.scale.set(0.04*aspect,0.04,1);
    const pos=ll2xyz(cl.lat,cl.lon,1.015);
    sp.position.copy(pos);
    markerGroup.add(sp);

    const hitR=cl.count>1?0.04:0.03;
    const hs=new THREE.Mesh(
      new THREE.SphereGeometry(hitR,6,6),
      new THREE.MeshBasicMaterial({transparent:true,opacity:0,depthWrite:false})
    );
    hs.position.copy(pos);
    hs.userData.cl=cl;
    markerGroup.add(hs);

    allMarkers.push({
      sprite:sp,hitMesh:hs,cl,
      aspect,isSingle:cl.count===1,
      opacity:0,targetOpacity:1,
      born:performance.now()+Math.random()*300
    });
  });
}

function refreshClusters(camZ,force=false){
  const gd=gridDegForZoom(camZ);
  if(gd===prevGridDeg&&!force) return;
  prevGridDeg=gd;
  buildMarkersForClusters(buildClusters(EVENTS,gd));
}

// ═══════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════
const panel=document.getElementById('panel');
const clist=document.getElementById('clist');
const tip=document.getElementById('tip');
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
let isDrag=false,prevM={x:0,y:0};
let velY=0,velX=0;

function showPanel(ev){
  velY=0;velX=0;
  document.getElementById('pname').textContent=ev.eventName;
  document.getElementById('pcity').textContent=ev.city+', ';
  document.getElementById('pcountry').textContent=ev.country;
  document.getElementById('pdate').textContent=fmtDate(ev.startDate,ev.endDate);
  const lnk=document.getElementById('plink');
  lnk.href=ev.eventUrl||'#';
  const noLink=!ev.eventUrl||ev.eventUrl==='#';
  lnk.style.opacity=noLink?.4:1;
  lnk.style.pointerEvents=noLink?'none':'auto';
  panel.classList.add('on');clist.classList.remove('on');
}

function showCluster(cl){
  if(cl.count===1){showPanel(cl.events[0]);return;}
  const sorted=[...cl.events].sort((a,b)=>new Date(a.startDate||0)-new Date(b.startDate||0));
  document.getElementById('clist-title').textContent=(sorted[0].city||sorted[0].country)+' — '+sorted.length+' etkinlik';
  const body=document.getElementById('clist-body');
  body.innerHTML=sorted.map((ev,i)=>`
    <div class="citem" data-i="${i}">
      <div class="citem-name">${ev.eventName}</div>
      <div class="citem-meta">${ev.city}, ${ev.country} · ${ev.startDate?new Date(ev.startDate).toLocaleDateString('tr-TR',{day:'numeric',month:'short',year:'numeric'}):'—'}</div>
    </div>`).join('');
  body.querySelectorAll('.citem').forEach(el=>{
    el.addEventListener('click',()=>showPanel(sorted[+el.dataset.i]));
  });
  clist.classList.add('on');panel.classList.remove('on');
}

document.getElementById('pcls').addEventListener('click',()=>panel.classList.remove('on'));
document.getElementById('clist-cls').addEventListener('click',()=>clist.classList.remove('on'));

function getHitMeshes(){return allMarkers.filter(m=>m.opacity>.1).map(m=>m.hitMesh);}

function pick(e){
  const rect=renderer.domElement.getBoundingClientRect();
  mouse.set(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1);
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(getHitMeshes());
  if(hits.length){showCluster(hits[0].object.userData.cl);return true;}
  panel.classList.remove('on');clist.classList.remove('on');
  return false;
}

function hoverCheck(e){
  if(isDrag){tip.classList.remove('on');return;}
  const rect=renderer.domElement.getBoundingClientRect();
  mouse.set(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1);
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(getHitMeshes());
  if(hits.length){
    const cl=hits[0].object.userData.cl;
    tip.textContent=cl.count===1?cl.events[0].city+', '+cl.events[0].country:cl.count+' etkinlik';
    tip.style.left=e.clientX+'px';tip.style.top=e.clientY+'px';
    tip.classList.add('on');container.style.cursor='pointer';
  } else {
    tip.classList.remove('on');
    container.style.cursor=isDrag?'grabbing':'grab';
  }
}

// Rotation speed: slows proportionally when zoomed in
function rotSpeed(){return Math.min(1.0,(camZ-1.0)/1.8);}

// Mouse
container.addEventListener('mousedown',e=>{
  isDrag=false;prevM={x:e.clientX,y:e.clientY};
  const MM=ev=>{
    const dx=ev.clientX-prevM.x,dy=ev.clientY-prevM.y;
    if(Math.abs(dx)>2||Math.abs(dy)>2) isDrag=true;
    if(isDrag){
      const s=rotSpeed();
      velY=dx*.005*s;velX=dy*.004*s;
      globe.rotation.y+=dx*.004*s;globe.rotation.x+=dy*.003*s;
      markerGroup.rotation.y=globe.rotation.y;markerGroup.rotation.x=globe.rotation.x;
    }
    prevM={x:ev.clientX,y:ev.clientY};
  };
  const MU=ev=>{
    window.removeEventListener('mousemove',MM);window.removeEventListener('mouseup',MU);
    if(!isDrag) pick(ev);
  };
  window.addEventListener('mousemove',MM);window.addEventListener('mouseup',MU);
});
container.addEventListener('mousemove',hoverCheck);

// Touch
let t0=null,pinchDist0=null;
container.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    pinchDist0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  } else {
    t0={x:e.touches[0].clientX,y:e.touches[0].clientY,moved:false};
  }
},{passive:true});
container.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&pinchDist0!=null){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    camZ=Math.min(5.5,Math.max(1.1,camZ-(d-pinchDist0)*.008));
    camera.position.z=camZ;refreshClusters(camZ);pinchDist0=d;
  } else if(t0&&e.touches.length===1){
    const dx=e.touches[0].clientX-t0.x,dy=e.touches[0].clientY-t0.y;
    if(Math.abs(dx)>4||Math.abs(dy)>4) t0.moved=true;
    if(t0.moved){
      const s=rotSpeed();
      velY=dx*.004*s;velX=dy*.003*s;
      globe.rotation.y+=dx*.003*s;globe.rotation.x+=dy*.0025*s;
      markerGroup.rotation.y=globe.rotation.y;markerGroup.rotation.x=globe.rotation.x;
    }
    t0.x=e.touches[0].clientX;t0.y=e.touches[0].clientY;
  }
},{passive:true});
container.addEventListener('touchend',e=>{
  pinchDist0=null;
  if(t0&&!t0.moved) pick({clientX:e.changedTouches[0].clientX,clientY:e.changedTouches[0].clientY});
  t0=null;
},{passive:true});

// Wheel zoom — extended range 1.1 … 5.5
let camZ=2.8;
let zoomTimer=null;
container.addEventListener('wheel',e=>{
  e.preventDefault();
  camZ=Math.min(5.5,Math.max(1.1,camZ+e.deltaY*.003));
  camera.position.z=camZ;
  clearTimeout(zoomTimer);
  zoomTimer=setTimeout(()=>refreshClusters(camZ),80);
},{passive:false});

window.addEventListener('resize',()=>{
  camera.aspect=W()/H();camera.updateProjectionMatrix();
  renderer.setSize(W(),H());
});

// Search
const searchEl=document.getElementById('search');
const searchBtn=document.getElementById('search-btn');
let searchOpen=false;
searchBtn.addEventListener('click',()=>{
  searchOpen=!searchOpen;
  searchEl.classList.toggle('open',searchOpen);
  if(searchOpen) searchEl.focus(); else{searchEl.value='';applySearch('');}
});
searchEl.addEventListener('input',e=>applySearch(e.target.value.trim().toLowerCase()));
searchEl.addEventListener('keydown',e=>{
  if(e.key==='Escape'){searchOpen=false;searchEl.classList.remove('open');searchEl.value='';applySearch('');}
});
function applySearch(q){
  allMarkers.forEach(m=>{
    if(!q){m.targetOpacity=1;return;}
    const match=m.cl.events.some(ev=>
      ev.city.toLowerCase().includes(q)||ev.country.toLowerCase().includes(q)||ev.eventName.toLowerCase().includes(q));
    m.targetOpacity=match?1:.05;
  });
  const first=allMarkers.find(m=>m.targetOpacity===1&&q.length>1);
  if(first) showCluster(first.cl);
}

// Data
async function loadData(){
  if(DATA_URL){
    try{const res=await fetch(DATA_URL);const json=await res.json();EVENTS=json.length?json:DEMO_EVENTS;}
    catch{EVENTS=DEMO_EVENTS;}
  } else EVENTS=DEMO_EVENTS;
  const countries=new Set(EVENTS.map(e=>e.country));
  document.getElementById('ev-count').textContent=EVENTS.length+' etkinlik · '+countries.size+' ülke';
  document.getElementById('s-total').textContent=EVENTS.length;
  document.getElementById('s-country').textContent=countries.size;
  refreshClusters(camZ,true);
}

// ═══════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════
const camDir=new THREE.Vector3();
let frame=0;

function animate(){
  requestAnimationFrame(animate);
  frame++;
  const now=performance.now();

  // Momentum
  globe.rotation.y+=velY;globe.rotation.x+=velX;
  markerGroup.rotation.y=globe.rotation.y;markerGroup.rotation.x=globe.rotation.x;
  velY*=.95;velX*=.95;
  scene.children[0].rotation.y=frame*.0001;

  camera.getWorldDirection(camDir);
  const t=now*.001;

  // Screen-constant marker sizing
  const fovRad=camera.fov*Math.PI/180;
  const worldHeight=2*camZ*Math.tan(fovRad/2);
  const pxToWorld=worldHeight/H();

  // Target sizes in screen pixels
  const PX_SINGLE=14;   // single dot
  const PX_CLUSTER=22;  // cluster pill height

  allMarkers.forEach((m,i)=>{
    const wpos=new THREE.Vector3();
    m.sprite.getWorldPosition(wpos);
    wpos.normalize();
    const camDirNeg=camDir.clone().negate();
    const facing=wpos.dot(camDirNeg)>-0.05;
    const finalTarget=facing?m.targetOpacity:0;

    if(now<m.born){m.sprite.material.opacity=0;m.hitMesh.visible=false;return;}

    m.opacity+=(finalTarget-m.opacity)*.12;
    m.sprite.material.opacity=Math.max(0,Math.min(1,m.opacity));
    m.hitMesh.visible=m.opacity>.15&&facing;

    // Constant screen size
    const targetPx=m.isSingle?PX_SINGLE:PX_CLUSTER;
    let sc=targetPx*pxToWorld;
    if(m.isSingle){
      sc*=1+Math.sin(t*2.5+i*.7)*.05; // subtle pulse
    }
    m.sprite.scale.set(sc*m.aspect,sc,1);
  });

  renderer.render(scene,camera);
}

// Boot
let introP=0;
function boot(){
  introP+=.014;
  const ease=1-Math.pow(1-Math.min(introP,1),3);
  camera.position.z=6-ease*3.2;
  renderer.render(scene,camera);
  if(introP<1) requestAnimationFrame(boot);
  else{camera.position.z=camZ;animate();}
}

loadData().then(()=>{
  boot();
  const ld=document.getElementById('loading');
  ld.classList.add('fade');
  setTimeout(()=>ld.remove(),900);
}).catch(err=>{
  console.error(err);
  document.getElementById('loading').querySelector('p').textContent='Hata: '+err.message;
});
</script>

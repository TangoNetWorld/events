
name: Aylık Veri Güncelleme

on:
  # Her ayın 1'i saat 03:00 UTC'de otomatik çalışır
  schedule:
    - cron: '0 3 1 * *'

  # "Run workflow" butonuyla istediğin zaman manuel çalıştır
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # events.json'u repo'ya geri yazabilmek için

    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: pip install requests beautifulsoup4

      - name: Scrap çalıştır
        run: |
          cd .scraper
          python scraper.py

      - name: events.json public klasörüne taşı
        run: |
          cp .scraper/events.json public/events.json
          cp .scraper/events.json events.json

      - name: Güncel events.json repoya kaydet
        run: |
          git config user.name "Tango Bot"
          git config user.email "bot@tango-world.com"
          git add events.json public/events.json
          git diff --staged --quiet || git commit -m "🗓️ Otomatik: events.json güncellendi ($(date '+%Y-%m-%d'))"
          git push

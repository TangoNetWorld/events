
name: Site Deploy

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Aylık Veri Güncelleme"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu indir
        uses: actions/checkout@v4

      - name: events.jsonu publice kopyala
        run: |
          cp events.json public/events.json 2>/dev/null || echo "events.json yok, demo veri kullanılacak"

      - name: Pages ayarla
        uses: actions/configure-pages@v5

      - name: Public klasörünü yükle
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy et
        id: deployment
        uses: actions/deploy-pages@v4
